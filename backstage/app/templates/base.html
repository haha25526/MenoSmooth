<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}更年不期后台{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #FAFAF7; }
        .nav { background: linear-gradient(135deg, #5B8A72, #7FB096); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-size: 18px; font-weight: bold; }
        .nav-links { display: flex; gap: 4px; }
        .nav a { color: white; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 14px; }
        .nav a:hover, .nav a.active { background: rgba(255,255,255,0.2); }
        .content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #E8E4DE; }
        .card-title { font-size: 15px; font-weight: 600; color: #3D3D3D; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #E8E4DE; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .stat-card { background: #F5F1EB; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #4A7360; }
        .stat-label { font-size: 13px; color: #6B6B6B; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #E8E4DE; padding: 10px 12px; text-align: left; }
        th { font-weight: 600; color: #3D3D3D; background: #F5F1EB; }
        tr:hover { background: #F5F1EB; }
        .btn { display: inline-block; padding: 6px 14px; background: #5B8A72; color: white; text-decoration: none; border-radius: 6px; font-size: 13px; border: none; cursor: pointer; }
        .btn:hover { background: #4A7360; }
        .search-box { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-box input { flex: 1; padding: 10px 14px; border: 1px solid #E8E4DE; border-radius: 8px; font-size: 14px; }
        .pagination { display: flex; gap: 5px; justify-content: center; margin-top: 16px; }
        .pagination a, .pagination span { padding: 6px 12px; border: 1px solid #E8E4DE; border-radius: 6px; text-decoration: none; color: #3D3D3D; font-size: 13px; }
        .pagination .active { background: #5B8A72; color: white; border-color: #5B8A72; }
        .text-muted { color: #999; }
        .text-center { text-align: center; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .avatar-sm { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">🌸 更年不期后台</div>
        <div class="nav-links">
            <a href="/backstage/dashboard" class="{% if request.url.path == '/backstage/dashboard' %}active{% endif %}">概览</a>
            <a href="/backstage/users" class="{% if '/users' in request.url.path %}active{% endif %}">用户管理</a>
            <a href="/backstage/logout">登出</a>
        </div>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
